version: 2.1

# Dynamic config: this file is a setup workflow that decides which pipeline
# parameters to set based on which files changed, then hands off to
# .circleci/continue-config.yml for the real jobs and workflows.
#
# Requires "Dynamic config using setup workflows" enabled in the CircleCI
# project settings (Project Settings -> Advanced -> Enable dynamic config).
setup: true

orbs:
  # v2.0.0 of this orb migrated from Python to Bash, eliminating a
  # get-pip.py bootstrap failure ("This script does not work on Python
  # 3.9. The minimum supported Python version is 3.10") that broke the
  # path-filtering job when CircleCI's default Python 3.9 image started
  # rejecting the modern get-pip.py.
  path-filtering: circleci/path-filtering@3.0.0

workflows:
  setup:
    jobs:
      - path-filtering/filter:
          # Compare changes against main so feature branches see their own
          # diff against the base. On main itself the orb falls back to
          # comparing HEAD against HEAD~1.
          base-revision: main
          config-path: .circleci/continue-config.yml
          # Format: <regex>  <parameter-name>  <value>
          # A file matches if any regex fires. Multiple rules may fire per
          # path. If no rule fires, parameters keep their defaults (false).
          # .circleci/* is routed to nginx-changed so that updates to this
          # pipeline itself trigger a nginx deploy verification on main.
          mapping: |
            ^nginx/.*                 nginx-changed  true
            ^deploy/nginx/.*          nginx-changed  true
            ^\.circleci/.*            nginx-changed  true
