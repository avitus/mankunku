version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "package-lock.json" }}
            - deps-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Run unit and integration tests
          command: npx vitest run

  build:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "package-lock.json" }}
            - deps-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Build SvelteKit app
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - build
            - package.json
            - package-lock.json
            - ecosystem.config.cjs

  deploy:
    docker:
      - image: cimg/base:current
    steps:
      - attach_workspace:
          at: /tmp/workspace
      - add_ssh_keys:
          fingerprints:
            - "SHA256:Ihr+0abLLRwgOuGASn7jCw9jdB4nhZiInP2gUmJ13Dk"
      - run:
          name: Add server to known_hosts
          command: ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
      - run:
          name: Debug SSH connection
          command: ssh -vvv $DEPLOY_USER@$DEPLOY_HOST 'echo connected' 2>&1 || true
      - run:
          name: Deploy to server
          command: |
            # Backup current release for rollback
            ssh $DEPLOY_USER@$DEPLOY_HOST 'cd ~/mankunku && rm -rf build.previous && cp -r build build.previous 2>/dev/null || true'

            # Rsync build artifacts to server
            rsync -avz --delete \
              /tmp/workspace/build/ \
              $DEPLOY_USER@$DEPLOY_HOST:/home/$DEPLOY_USER/mankunku/build/

            # Rsync package files for production dependency installation
            rsync -avz \
              /tmp/workspace/package.json \
              /tmp/workspace/package-lock.json \
              /tmp/workspace/ecosystem.config.cjs \
              $DEPLOY_USER@$DEPLOY_HOST:/home/$DEPLOY_USER/mankunku/

            # Install production deps and restart
            ssh $DEPLOY_USER@$DEPLOY_HOST 'cd ~/mankunku && npm ci --omit=dev && pm2 startOrRestart ecosystem.config.cjs --env production && pm2 save'

workflows:
  ci:
    jobs:
      - test
      - build:
          requires:
            - test
          filters:
            branches:
              only: main
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: main
