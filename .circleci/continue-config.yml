version: 2.1

# Continuation config invoked by .circleci/config.yml via the path-filtering
# orb. Pipeline parameters below are set by that orb based on which files
# changed in the push.
parameters:
  nginx-changed:
    type: boolean
    default: false

jobs:
  test:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "package-lock.json" }}
            - deps-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Run unit and integration tests
          command: npx vitest run

  build:
    docker:
      - image: cimg/node:22.14
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "package-lock.json" }}
            - deps-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Build SvelteKit app
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - build
            - package.json
            - package-lock.json
          # NOTE: ecosystem.config.cjs is NOT persisted here. The deploy job
          # ships it straight from its own checkout to avoid a mystery where
          # /tmp/workspace/ecosystem.config.cjs arrived on the server with
          # pre-atomic-release content (cwd: '/home/deploy/mankunku' without
          # /current/) even though the committed file was the new version.

  db-migrate:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Install Supabase CLI
          command: |
            set -euo pipefail
            # Pin a known-stable CLI version. Bump deliberately; releases
            # at https://github.com/supabase/cli/releases.
            SUPABASE_CLI_VERSION="2.95.5"
            BASE_URL="https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}"
            TARBALL="supabase_linux_amd64.tar.gz"
            CHECKSUMS="supabase_${SUPABASE_CLI_VERSION}_checksums.txt"
            TMP_DIR="$(mktemp -d)"
            trap 'rm -rf "$TMP_DIR"' EXIT
            # Download archive + checksums file from the same release tag,
            # then verify the tarball against the published SHA256 before
            # extracting. Aborts on mismatch via sha256sum -c's exit code.
            curl -fsSL -o "$TMP_DIR/$TARBALL" "$BASE_URL/$TARBALL"
            curl -fsSL -o "$TMP_DIR/$CHECKSUMS" "$BASE_URL/$CHECKSUMS"
            (cd "$TMP_DIR" && grep " $TARBALL\$" "$CHECKSUMS" | sha256sum -c -)
            sudo tar -xzf "$TMP_DIR/$TARBALL" -C /usr/local/bin supabase
            supabase --version
      - run:
          name: Apply pending migrations
          environment:
            SUPABASE_PROJECT_REF: ynzfliunzejusnlvpeey
          command: |
            set -euo pipefail
            # SUPABASE_ACCESS_TOKEN must be set in CircleCI env vars
            # (Project Settings → Environment Variables). Generate one
            # at https://supabase.com/dashboard/account/tokens — give it
            # a descriptive name like "circleci-mankunku-deploy".
            #
            # The CLI uses this access token to fetch project connection
            # details from Supabase's API at runtime, so no separate DB
            # password / connection string is needed.
            if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
              echo "error: SUPABASE_ACCESS_TOKEN is not set in CircleCI env" >&2
              exit 1
            fi
            # Link to the project (no-op if already linked in the working
            # directory) and apply pending migrations. db push is a no-op
            # when schema_migrations is up-to-date.
            supabase link --project-ref "$SUPABASE_PROJECT_REF"
            supabase db push --linked

  deploy:
    docker:
      - image: cimg/base:current
    steps:
      - attach_workspace:
          at: /tmp/workspace
      - checkout
      - add_ssh_keys:
          fingerprints:
            - "SHA256:EE3+mp97fBRW+P32GUizJAnsX9lPkEeRrmuGudIFDqU"
      - run:
          name: Add server to known_hosts
          command: ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
      - run:
          name: Install rsync
          command: sudo apt-get update && sudo apt-get install -y rsync
      - run:
          name: Deploy atomic release
          command: |
            set -euo pipefail

            # Each deploy lands in its own releases/<id>/ dir; release.sh
            # atomically flips the `current` symlink and restarts PM2.
            RELEASE_ID="$(date -u +%Y%m%d-%H%M%S)-${CIRCLE_SHA1:0:7}"
            REMOTE_ROOT="/home/${DEPLOY_USER}/mankunku"
            STAGE="${REMOTE_ROOT}/releases/${RELEASE_ID}"
            REMOTE_SCRIPT="/tmp/mankunku-release.${CIRCLE_WORKFLOW_ID:-$CIRCLE_SHA1}.sh"

            echo "==> Release ID: ${RELEASE_ID}"

            # Sanity-check the ecosystem.config.cjs we're about to ship. The
            # workspace version has shown up stale on the server once before;
            # keeping the hash in the log makes any future drift obvious.
            LOCAL_SHA=$(sha256sum ecosystem.config.cjs | cut -d' ' -f1)
            echo "==> ecosystem.config.cjs (deploy checkout) sha256: ${LOCAL_SHA}"

            ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${STAGE}/build'"

            rsync -avz \
              /tmp/workspace/build/ \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${STAGE}/build/"

            rsync -avz \
              /tmp/workspace/package.json \
              /tmp/workspace/package-lock.json \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${STAGE}/"

            # Ship ecosystem.config.cjs via scp (not rsync), from the deploy
            # job's own checkout. Previous deploys ended up with pre-atomic
            # content on the server despite CI shipping the right sha, and
            # rsync was the one variable in the chain we hadn't swapped out.
            # Verify the landed file matches what we sent; abort if it didn't.
            scp ecosystem.config.cjs \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${STAGE}/ecosystem.config.cjs"
            REMOTE_SHA=$(ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "sha256sum '${STAGE}/ecosystem.config.cjs' | cut -d' ' -f1")
            echo "==> ecosystem.config.cjs (server, after scp) sha256: ${REMOTE_SHA}"
            if [[ "${LOCAL_SHA}" != "${REMOTE_SHA}" ]]; then
              echo "error: ecosystem.config.cjs content drifted between CI and server" >&2
              echo "  local:  ${LOCAL_SHA}" >&2
              echo "  remote: ${REMOTE_SHA}" >&2
              exit 1
            fi

            scp deploy/app/release.sh \
              "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_SCRIPT}"

            ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "bash -l -c \"trap 'rm -f ${REMOTE_SCRIPT}' EXIT; bash ${REMOTE_SCRIPT} ${RELEASE_ID}\""

  nginx-deploy:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - "SHA256:EE3+mp97fBRW+P32GUizJAnsX9lPkEeRrmuGudIFDqU"
      - run:
          name: Add server to known_hosts
          command: |
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
      - run:
          name: Copy nginx config and deploy script to server
          command: |
            PORT="${DEPLOY_PORT:-22}"
            # Per-workflow suffix so concurrent nginx-deploy runs cannot clobber
            # each other's staged files on the server.
            SUFFIX="${CIRCLE_WORKFLOW_ID:-$CIRCLE_SHA1}"
            REMOTE_CONFIG="/tmp/mankunku.${SUFFIX}.nginx.staged"
            REMOTE_SCRIPT="/tmp/deploy-nginx.${SUFFIX}.sh"
            scp -P "$PORT" nginx/mankunku.conf "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_CONFIG"
            scp -P "$PORT" deploy/nginx/deploy.sh "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_SCRIPT"
      - run:
          name: Run nginx deploy script on server
          command: |
            PORT="${DEPLOY_PORT:-22}"
            SUFFIX="${CIRCLE_WORKFLOW_ID:-$CIRCLE_SHA1}"
            REMOTE_CONFIG="/tmp/mankunku.${SUFFIX}.nginx.staged"
            REMOTE_SCRIPT="/tmp/deploy-nginx.${SUFFIX}.sh"
            ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
              set -e
              trap 'rm -f \"$REMOTE_SCRIPT\" \"$REMOTE_CONFIG\"' EXIT
              bash \"$REMOTE_SCRIPT\" \"$REMOTE_CONFIG\"
            "

workflows:
  # Existing app pipeline — unchanged behavior. Runs on every push; build and
  # deploy gated to main.
  ci:
    jobs:
      - test
      - build:
          requires:
            - test
          filters:
            branches:
              only: main
      - db-migrate:
          # Gate on `build` (not just `test`) so a failed build can't
          # leave the schema ahead of code that never shipped. Migrations
          # run only after the artifact is proven buildable; deploy then
          # waits on the migration in turn.
          requires:
            - build
          filters:
            branches:
              only: main
      - deploy:
          # db-migrate already implies build; listing both is redundant
          # but keeps the dependency graph self-explanatory at a glance.
          requires:
            - build
            - db-migrate
          filters:
            branches:
              only: main

  # Nginx pipeline — runs only when nginx-related files changed on main.
  nginx-deploy:
    when: << pipeline.parameters.nginx-changed >>
    jobs:
      - nginx-deploy:
          filters:
            branches:
              only: main
