# nginx/mankunku.conf — Production nginx configuration for mankunkujazz.com
#
# This file is the single source of truth for the server's nginx config.
# CircleCI deploys it to /etc/nginx/sites-available/mankunku whenever this
# file, deploy/nginx/deploy.sh, or .circleci/config.yml changes on main.
# See README section "Nginx deployment" for details.
#
# Manual fallback: copy this file to the server, then run
#   bash deploy/nginx/deploy.sh /path/to/staged-config
#
# Prerequisites on the server:
#   - certbot with a Let's Encrypt certificate for mankunkujazz.com
#   - /var/www/certbot directory for ACME challenges
#   - DH parameters at /etc/letsencrypt/ssl-dhparams.pem
#   - Symlink /etc/nginx/sites-enabled/mankunku -> /etc/nginx/sites-available/mankunku

map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

# HTTP — redirect to HTTPS + Let's Encrypt ACME challenges
server {
	listen 80;
	server_name mankunkujazz.com;

	# Certbot ACME challenge (must remain accessible over HTTP)
	location /.well-known/acme-challenge/ {
		root /var/www/certbot;
	}

	# Redirect all other HTTP traffic to HTTPS
	location / {
		return 301 https://mankunkujazz.com$request_uri;
	}
}

# HTTPS — TLS termination + reverse proxy to SvelteKit
server {
	listen 443 ssl http2;
	server_name mankunkujazz.com;

	# --- TLS certificates (Let's Encrypt) ---
	ssl_certificate     /etc/letsencrypt/live/mankunkujazz.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/mankunkujazz.com/privkey.pem;

	# --- TLS hardening (Mozilla Intermediate profile) ---
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
	ssl_prefer_server_ciphers off;

	# Session resumption (no session tickets — avoids key rotation complexity)
	ssl_session_timeout 1d;
	ssl_session_cache shared:SSL:10m;
	ssl_session_tickets off;

	# Diffie-Hellman parameters for forward secrecy
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	# OCSP stapling — nginx caches OCSP responses, reducing client latency
	ssl_stapling on;
	ssl_stapling_verify on;
	ssl_trusted_certificate /etc/letsencrypt/live/mankunkujazz.com/chain.pem;
	resolver 8.8.8.8 8.8.4.4 valid=300s;
	resolver_timeout 5s;

	# --- Security headers ---
	# HSTS: browsers must use HTTPS for this domain (2 years)
	# Note: add_header does not inherit into location blocks that define
	# their own add_header, so HSTS is duplicated in each location block.
	add_header Strict-Transport-Security "max-age=63072000" always;

	# --- Application proxy rules ---

	# Vite-hashed assets — immutable cache
	location /_app/ {
		proxy_pass http://127.0.0.1:3000;
		expires 1y;
		add_header Cache-Control "public, immutable";
		add_header Strict-Transport-Security "max-age=63072000" always;
		access_log off;
	}

	# Service worker — must revalidate
	location /service-worker.js {
		proxy_pass http://127.0.0.1:3000;
		expires 0;
		add_header Cache-Control "no-cache";
		add_header Strict-Transport-Security "max-age=63072000" always;
	}

	# Everything else — SSR pages, API routes, static files
	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;

		# Buffer upstream responses. SvelteKit can emit large response headers
		# (session cookies, CSP, etc.) that overflow the default 4k/8k buffers
		# and surface as 502 Bad Gateway. These sizes absorb headers up to 16k.
		proxy_buffering on;
		proxy_buffer_size 16k;
		proxy_buffers 8 16k;
		proxy_busy_buffers_size 32k;
	}
}
